<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RushEats — Proceso Real</title>
    <style>
        :root {
            --primary: #ff5a00;
            --success: #00b894;
            --secondary: #2d3436;
            --bg: #fdfdfd;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--secondary); overflow-x: hidden; }
        
        /* Navbar */
        .header { background: var(--white); padding: 1rem; text-align: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.4rem; letter-spacing: -1px; }

        /* Paneles */
        .panel { max-width: 500px; margin: 1rem auto; padding: 1.5rem; display: none; animation: slideIn 0.3s ease-out; }
        .panel.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Cards y Listas */
        .card { background: var(--white); border-radius: 15px; padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 15px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
        
        .plato-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 1rem; border-radius: 12px; margin-bottom: 0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        /* Formuarios */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #636e72; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* Botones */
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #e04f00; }
        .btn-ghost { background: #eee; color: #555; margin-bottom: 1rem; }

        /* Mini Alertas (Toast) */
        #toast-container { position: fixed; top: 80px; right: 20px; z-index: 1000; }
        .toast { background: var(--secondary); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; animation: fadeInRight 0.3s; border-left: 4px solid var(--primary); }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

        /* Botón Flotante Carrito */
        #btn-flotante-carrito { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 8px 15px rgba(255,90,0,0.4); cursor: pointer; display: none; z-index: 900; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header class="header">
        <h1>RushEats</h1>
    </header>

    <section id="panel-restaurantes" class="panel active">
        <h2>Restaurantes abiertos</h2>
        <div id="lista-restaurantes"></div>
    </section>

    <section id="panel-menu" class="panel">
        <button class="btn btn-ghost" onclick="irAPaso('panel-restaurantes')">← Cambiar Restaurante</button>
        <h2 id="nombre-header-menu">Menú</h2>
        <div id="lista-platos"></div>
    </section>

    <section id="panel-direccion" class="panel">
        <button class="btn btn-ghost" onclick="irAPaso('panel-menu')">← Volver al menú</button>
        <h2>¿A dónde lo llevamos?</h2>
        <div class="form-group">
            <label>Calle y Número</label>
            <input type="text" id="dir-calle" placeholder="Ej: Av. Principal 123">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Piso/Dpto</label>
                <input type="text" id="dir-piso" placeholder="2B">
            </div>
            <div class="form-group" style="flex: 2;">
                <label>Referencia</label>
                <input type="text" id="dir-ref" placeholder="Portón azul">
            </div>
        </div>
        <button class="btn btn-primary" onclick="validarDireccion()">Continuar al Pago</button>
    </section>

    <section id="panel-pago" class="panel">
        <button class="btn btn-ghost" onclick="irAPaso('panel-direccion')">← Volver a dirección</button>
        <h2>Resumen y Pago</h2>
        <div id="resumen-pedido" style="background: #fff; padding: 1rem; border-radius: 10px; margin-bottom: 1rem;"></div>
        <div class="form-group">
            <label>Tarjeta de Crédito</label>
            <input type="text" placeholder="0000 0000 0000 0000">
        </div>
        <button class="btn btn-primary" onclick="irAPaso('panel-exito')">Pagar Ahora</button>
    </section>

    <section id="panel-exito" class="panel" style="text-align: center;">
        <div style="font-size: 4rem;">🛵</div>
        <h2>¡Pedido en camino!</h2>
        <p>Tu comida va hacia: <br><strong id="dir-final"></strong></p>
        <button class="btn btn-primary" onclick="location.reload()">Hacer otro pedido</button>
    </section>

    <button id="btn-flotante-carrito" onclick="irAPaso('panel-direccion')">
        Ir a pedir (<span id="count-carrito">0</span>)
    </button>

    <script src="script.js"></script>
</body>
</html>
